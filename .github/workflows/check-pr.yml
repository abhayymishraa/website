name: PR Content Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  check-pr-content:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check PR content
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const prBody = pr.body || '';

            let missingItems = [];

            // Check for issue links
            const issueRegex = /(closes|related to)\s+#\d+/i;
            if (!issueRegex.test(prBody)) {
              missingItems.push('issue reference');
            }

            // Check for kind of change
            // Extract content between headers or until the next section
            const changeMatch = prBody.match(/\*\*What kind of change does this PR introduce\?\*\*([\s\S]*?)(?=\*\*|$)/);
            const changeContent = changeMatch ? changeMatch[1].trim() : '';

            // Check if content exists and is not just the template comment
            if (!changeContent || changeContent.includes('<!-- E.g. a bugfix') || 
                changeContent.length < 5) {  // Minimum meaningful content length
              missingItems.push('kind of change description');
            }

            // Check for breaking changes
            const breakingMatch = prBody.match(/\*\*Does this PR introduce a breaking change\?\*\*([\s\S]*?)(?=\*\*|$)/);
            const breakingContent = breakingMatch ? breakingMatch[1].trim() : '';

            // Check if breaking changes section has meaningful content
            if (!breakingContent || breakingContent.includes('<!-- If this PR introduces') || 
                breakingContent.length < 5) {
              missingItems.push('breaking changes information');
            }


            // Check for unchecked items in checklist
            if (prBody.includes('- [ ]')) {
              missingItems.push('completed checklist items');
            }

            // If any required information is missing, comment on the PR
            if (missingItems.length > 0) {
              const missingItemsList = missingItems.join(', ');
              const comment = `Hi @${pr.user.login}! Thanks a lot for your contribution! 
              
              I noticed that the following required information is missing or incomplete: ${missingItemsList}

              Please update the PR description to include this information. You can find placeholders in the PR template for these items.

              Thanks a lot!`;
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
              
              // Optional: Add a label to indicate missing information
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['needs-info']
              });
            }
